name: Create tag
description: Create a git tag from a provided semver tag and push it to the origin remote if needed.
inputs:
  tag:
    description: The tag to create, for example v1.2.3.
    required: true
  git-user-name:
    description: Git user.name for the tag commit.
    required: true
  git-user-email:
    description: Git user.email for the tag commit.
    required: true
  tag-message:
    description: Annotation message for the created tag.
    required: false
    default: "Release version from package.json"
outputs:
  tag:
    description: The created tag name.
    value: ${{ steps.create.outputs.tag }}
runs:
  using: composite
  steps:
    - name: Create and push tag
      id: create
      shell: bash
      run: |
        tag='${{ inputs.tag }}'

        if ! [[ "$tag" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "tag must be a semver major.minor.patch string, optionally prefixed with v"
          exit 1
        fi

        git config user.name "${{ inputs.git-user-name }}"
        git config user.email "${{ inputs.git-user-email }}"
        if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
          echo "Tag $tag already exists on origin"
        else
          git tag -a "$tag" -m "${{ inputs.tag-message }}"
          git push origin "$tag"
        fi
        echo "tag=$tag" >> "$GITHUB_OUTPUT"
