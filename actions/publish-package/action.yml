name: Publish package to npm
description: Publish an npm package with provenance support using an explicit npm dist-tag.
inputs:
  package-json-path:
    description: Path to the package.json file for the package to publish.
    required: false
    default: package.json
  registry:
    description: npm registry URL.
    required: false
    default: https://registry.npmjs.org/
  access:
    description: Package access level for publish.
    required: false
    default: public
  npm-tag:
    description: npm dist-tag to publish under.
    required: false
    default: latest
  npm-token:
    description: Optional npm token fallback for authentication.
    required: false
runs:
  using: composite
  steps:
    - name: Setup npm registry
      shell: bash
      run: |
        npm config set registry "${{ inputs.registry }}"

    - name: Publish package
      shell: bash
      run: |
        project_dir=$(dirname "${{ inputs.package-json-path }}")
        cd "$project_dir"

        registry="${{ inputs.registry }}"
        registry_host="${registry#https://}"
        registry_host="${registry_host#http://}"
        registry_host="${registry_host%/}"

        if [ -n "${{ inputs.npm-token }}" ]; then
          npm config set "//${registry_host}/:_authToken" "${{ inputs.npm-token }}"
          npm config set "//${registry_host}/:always-auth" true
        else
          echo "No npm-token provided. Using OIDC auth if available."
        fi

        npm publish . --tag "${{ inputs.npm-tag }}" --access "${{ inputs.access }}" --provenance
