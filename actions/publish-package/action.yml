name: Publish package to npm
description: Publish an npm package with provenance support using an explicit npm dist-tag.
inputs:
  package-json-path:
    description: Path to the package.json file for the package to publish.
    required: false
    default: package.json
  registry:
    description: npm registry URL.
    required: false
    default: https://registry.npmjs.org/
  access:
    description: Package access level for publish.
    required: false
    default: public
  npm-tag:
    description: npm dist-tag to publish under.
    required: false
    default: latest
runs:
  using: composite
  steps:
    - name: Setup npm registry
      shell: bash
      run: |
        npm config set registry "${{ inputs.registry }}"

    - name: Publish package
      shell: bash
      run: |
        project_dir=$(dirname "${{ inputs.package-json-path }}")
        cd "$project_dir"

        npm publish . --tag "${{ inputs.npm-tag }}" --access "${{ inputs.access }}" --provenance
