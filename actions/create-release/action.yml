name: Create release from tag
description: Create a GitHub release from an existing semver git tag.
inputs:
  tag:
    description: The semver tag to release, for example `v1.2.3` or `1.2.3`.
    required: true
  body:
    description: The release body text.
    required: false
    default: ''
  github-token:
    description: GitHub token used to create the release.
    required: true
runs:
  using: composite
  steps:
    - name: Create GitHub release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        if ! command -v gh >/dev/null 2>&1; then
          echo "gh CLI is required on the runner"
          exit 1
        fi

        tag='${{ inputs.tag }}'

        if ! [[ "$tag" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "tag must be a semver major.minor.patch string, optionally prefixed with v"
          exit 1
        fi

        gh release create "$tag" \
          --repo "$GITHUB_REPOSITORY" \
          --title "$tag" \
          --notes "${{ inputs.body }}"
