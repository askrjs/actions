name: Create release from tag
description: Create a GitHub release from an existing semver git tag.
inputs:
  tag:
    description: The semver tag to release, for example `v1.2.3` or `1.2.3`.
    required: true
  body:
    description: The release body text.
    required: false
    default: ''
  github-token:
    description: GitHub token used to create the release.
    required: true
runs:
  using: composite
  steps:
    - name: Validate release tag
      id: validate_tag
      uses: ./actions/validate-semver
      with:
        semver: ${{ inputs.tag }}

    - name: Create GitHub release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        if ! command -v gh >/dev/null 2>&1; then
          echo "gh CLI is required on the runner"
          exit 1
        fi

        gh release create "${{ steps.validate_tag.outputs.value }}" \
          --repo "$GITHUB_REPOSITORY" \
          --title "${{ steps.validate_tag.outputs.value }}" \
          --notes "${{ inputs.body }}"
