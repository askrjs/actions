name: Create release from tag
description: Create a GitHub release from an existing semver git tag.
inputs:
  tag:
    description: The semver tag to release, for example `v1.2.3` or `1.2.3`.
    required: true
  body:
    description: The release body text.
    required: false
    default: ''
  github-token:
    description: GitHub token used to create the release.
    required: true
runs:
  using: composite
  steps:
    - name: Create GitHub release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        if ! [[ "${{ inputs.tag }}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "release tag must be a semver major.minor.patch value, optionally prefixed with v"
          exit 1
        fi

        gh release create "${{ inputs.tag }}" \
          --repo "$GITHUB_REPOSITORY" \
          --title "${{ inputs.tag }}" \
          --notes "${{ inputs.body }}"
