name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Shared Action Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 'lts/*'
      - name: Exercise package contract action
        uses: ./actions/validate-package-contract
        with:
          package-json-path: tests/fixtures/package.json
      - name: Reject tracked OS metadata
        shell: bash
        run: test -z "$(find . -name .DS_Store -not -path './.git/*' -print -quit)"
